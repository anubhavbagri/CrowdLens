services:
  # PostgreSQL removed in favor of SQLite

  # Redis (job queue backing store for rqueue — pure in-memory, no persistence)
  redis:
    image: redis:7-alpine
    container_name: crowdlens-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # DynamoDB Local (cache)
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: crowdlens-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/shell/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crowdlens-backend
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      dynamodb-local:
        condition: service_healthy
    volumes:
      - sqlite_data:/app/data
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000

      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
      REDDIT_USERNAME: ${REDDIT_USERNAME}
      REDDIT_PASSWORD: ${REDDIT_PASSWORD}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-crowdlens:v1.0}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      SHOW_SQL: ${SHOW_SQL:-false}

volumes:
  sqlite_data:
